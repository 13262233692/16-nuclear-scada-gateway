server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 10000
    accept-count: 200

spring:
  application:
    name: nuclear-scada-gateway
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      batch-size: 65536
      linger-ms: 5
      compression-type: lz4
      buffer-memory: 67108864
      enable-idempotence: true
      max-in-flight-requests-per-connection: 5
      retries: 10
      delivery-timeout-ms: 120000
    consumer:
      group-id: scada-clickhouse-writer
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 500
      fetch-min-size: 1024
      fetch-max-wait: 100ms
      properties:
        max.poll.interval.ms: 300000
        session.timeout.ms: 120000
        heartbeat.interval.ms: 30000
        request.timeout.ms: 130000
        isolation.level: read_committed
        default.api.timeout.ms: 60000
        connections.max.idle.ms: 540000
  datasource:
    url: jdbc:clickhouse://localhost:8123/scada
    username: default
    password: ""
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000

scada:
  netty:
    port: 4840
    boss-threads: 2
    worker-threads: 8
    idle-timeout-seconds: 120
  kafka:
    consumer:
      poll-timeout-ms: 100
      batch-size: 5000
      write-queue-capacity: 50000
      write-thread-count: 4
      max-poll-interval-ms: 300000
      session-timeout-ms: 120000
      heartbeat-interval-ms: 30000
      max-poll-records: 500
      retry-max-attempts: 3
      retry-backoff-ms: 1000
      commit-interval-ms: 5000
  fault-tracing:
    max-search-depth: 6
    anomaly-time-window-minutes: 5
    min-root-cause-probability: 0.3

spring:
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: scada1234

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nuclear.scada: INFO
    io.netty: WARN
    org.apache.kafka: WARN
